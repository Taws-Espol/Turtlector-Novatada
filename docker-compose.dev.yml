version: '1.0'

services:
  redis-dev:
    image: redis:7-alpine
    container_name: turtlector-redis-dev
    ports:
      - "6379:6379"
    networks:
      - turtlector-dev-network
    restart: unless-stopped
    command: redis-server --appendonly no

networks:
  turtlector-dev-network:
    driver: bridge
    name: turtlector-dev-network
